<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المحاسبة الذكية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; }
        .container { max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; }
        header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 1rem; text-align: center; }
        .menu { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; padding: 1rem; }
        .menu-btn { background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 0.8rem; padding: 0.6rem; text-align: center; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .menu-btn:hover { background: #e0e7ff; transform: translateY(-2px); }
        .screen { display: none; padding: 1rem; }
        .screen.active { display: block; }
        .back-btn { background: none; border: none; color: #3b82f6; font-weight: bold; margin-bottom: 1rem; cursor: pointer; }
        .form-card { background: #f8fafc; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; color: #1e3a8a; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-top: 0.2rem; }
        .btn { width: 100%; padding: 0.5rem; border: none; border-radius: 0.5rem; background: #3b82f6; color: white; cursor: pointer; margin-top: 0.5rem; font-weight: bold; }
        .btn-success { background: #059669; }
        .result { background: #e0e7ff; padding: 0.6rem; border-radius: 0.6rem; margin-top: 0.6rem; font-size: 0.8rem; }
        .search { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 0.6rem; }
        .cats { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .cat { padding: 0.3rem 1rem; background: #e2e8f0; border: none; border-radius: 2rem; cursor: pointer; font-size: 0.7rem; }
        .cat.active { background: #1e3a8a; color: white; }
        .stats { background: #e0e7ff; padding: 0.3rem 1rem; border-radius: 2rem; display: inline-block; margin-bottom: 1rem; font-size: 0.75rem; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .book-card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; }
        .book-cover { height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; }
        .book-info { padding: 0.6rem; }
        .book-title { font-weight: bold; font-size: 0.75rem; margin-bottom: 0.3rem; }
        .book-cat { display: inline-block; background: #e0e7ff; padding: 0.1rem 0.4rem; border-radius: 1rem; font-size: 0.6rem; color: #1e3a8a; }
        .download { display: block; margin-top: 0.4rem; background: #059669; color: white; text-decoration: none; padding: 0.3rem; text-align: center; border-radius: 0.4rem; font-size: 0.7rem; }
        .option { display: block; width: 100%; text-align: right; padding: 0.5rem; margin: 0.4rem 0; background: white; border: 1px solid #cbd5e1; border-radius: 0.5rem; cursor: pointer; }
        .correct-feedback { color: #059669; font-weight: bold; margin-top: 0.5rem; }
        .wrong-feedback { color: #dc2626; font-weight: bold; margin-top: 0.5rem; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 1rem; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s; }
        @media (max-width: 640px) { .menu { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📊 المحاسبة الذكية</h1>
        <p>مكتبة | اختبارات | إهلاك | تعادل | نسب مالية</p>
    </header>

    <div class="menu">
        <div class="menu-btn" onclick="showScreen('library')">📚 المكتبة</div>
        <div class="menu-btn" onclick="showScreen('exams')">❓ اختبارات</div>
        <div class="menu-btn" onclick="showScreen('depreciation')">📉 الإهلاك</div>
        <div class="menu-btn" onclick="showScreen('breakeven')">⚖️ التعادل</div>
        <div class="menu-btn" onclick="showScreen('ratios')">📊 نسب مالية</div>
    </div>

    <div id="library" class="screen active">
        <input type="text" id="search" class="search" placeholder="🔍 بحث في الكتب..." onkeyup="filterBooks()">
        <div class="cats" id="cats"></div>
        <div class="stats" id="stats"></div>
        <div class="books-grid" id="booksGrid"></div>
    </div>

    <div id="exams" class="screen">
        <button class="back-btn" onclick="showScreen('library')">← العودة</button>
        <div id="examArea">
            <div id="examStart" style="text-align:center; padding:1rem; background:#e0e7ff; border-radius:1rem;">
                <h3>📝 اختبار المحاسبة المتقدم</h3>
                <p>10 أسئلة عشوائية من أصل 150 سؤالاً</p>
                <button class="btn btn-success" onclick="startExam()" style="width:auto; padding:0.5rem 1.5rem;">🚀 ابدأ الاختبار</button>
            </div>
            <div id="examContent" style="display:none;">
                <div class="progress-bar"><div class="progress-fill" id="examProgress"></div></div>
                <div id="examQuestion" style="font-weight:bold; margin-bottom:0.8rem;"></div>
                <div id="examOptions"></div>
                <div id="examFeedback"></div>
                <button id="examNext" class="btn" style="display:none; margin-top:1rem;" onclick="nextQuestion()">التالي →</button>
            </div>
        </div>
        <div id="examResult" class="result" style="display:none;"></div>
    </div>

    <div id="depreciation" class="screen">
        <button class="back-btn" onclick="showScreen('library')">← العودة</button>
        <div class="form-card">
            <div class="form-group"><label>💰 تكلفة الأصل</label><input type="number" id="cost" value="100000"></div>
            <div class="form-group"><label>🔄 القيمة المتبقية</label><input type="number" id="salvage" value="10000"></div>
            <div class="form-group"><label>⏳ العمر الإنتاجي (سنوات)</label><input type="number" id="life" value="5"></div>
            <div class="form-group"><label>📅 تاريخ الشراء</label><input type="date" id="purchaseDate" value="2024-06-01"></div>
            <button class="btn" onclick="calcDep()">احسب الإهلاك</button>
            <div id="depResult" class="result"></div>
        </div>
    </div>

    <div id="breakeven" class="screen">
        <button class="back-btn" onclick="showScreen('library')">← العودة</button>
        <div class="form-card">
            <div class="form-group"><label>التكاليف الثابتة</label><input type="number" id="fixedCost" value="50000"></div>
            <div class="form-group"><label>سعر البيع للوحدة</label><input type="number" id="price" value="200"></div>
            <div class="form-group"><label>التكلفة المتغيرة للوحدة</label><input type="number" id="varCost" value="120"></div>
            <button class="btn" onclick="calcBE()">احسب نقطة التعادل</button>
            <div id="beResult" class="result"></div>
        </div>
    </div>

    <div id="ratios" class="screen">
        <button class="back-btn" onclick="showScreen('library')">← العودة</button>
        <div class="form-card">
            <div class="form-group"><label>الإيرادات</label><input type="number" id="revenue" value="1000000"></div>
            <div class="form-group"><label>صافي الربح</label><input type="number" id="netProfit" value="150000"></div>
            <div class="form-group"><label>إجمالي الأصول</label><input type="number" id="assets" value="1200000"></div>
            <div class="form-group"><label>حقوق الملكية</label><input type="number" id="equity" value="700000"></div>
            <button class="btn" onclick="calcRatios()">تحليل النسب</button>
            <div id="ratiosResult" class="result"></div>
        </div>
    </div>
</div>

<script>
    // روابط الملفات (ضع الروابط الصحيحة بعد التفعيل)
    const BOOKS_URL = "books.json";
    const QUESTIONS_URL = "questions.json";
    
    let allBooks = [];
    let currentCat = 'الكل';
    let allQuestions = [];
    let currentExamQuestions = [];
    let examIdx = 0, examScore = 0;
    
    // تحميل الكتب
    async function loadBooks() {
        try {
            const res = await fetch(BOOKS_URL);
            const data = await res.json();
            allBooks = data.map(book => ({
                name: book.name,
                display: book.name.replace(/\.pdf$/i, '').substring(0, 55),
                link: book.link,
                category: getCategory(book.name)
            }));
            renderBooks();
            loadCats();
        } catch(e) {
            document.getElementById('booksGrid').innerHTML = '<div class="result">⚠️ خطأ في تحميل الكتب</div>';
        }
    }
    
    function getCategory(name) {
        const n = name.toLowerCase();
        if (n.includes('cma') || n.includes('gleim')) return '🏅 CMA';
        if (n.includes('تكاليف') || n.includes('cost')) return '📊 تكاليف';
        if (n.includes('مالية') || n.includes('financial')) return '💰 مالية';
        if (n.includes('ادارية') || n.includes('managerial')) return '📈 إدارية';
        if (n.includes('بنوك')) return '🏦 بنوك';
        if (n.includes('فندقية') || n.includes('food')) return '🏨 فنادق';
        if (n.includes('زكاة') || n.includes('ضريبة')) return '⚖️ زكاة';
        if (n.includes('زراعية')) return '🌾 زراعية';
        return '📚 عامة';
    }
    
    function loadCats() {
        if (!allBooks.length) return;
        const cats = ['الكل', ...new Set(allBooks.map(b => b.category))];
        document.getElementById('cats').innerHTML = cats.map(c => `<button class="cat ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>`).join('');
    }
    
    function setCat(c) { currentCat = c; loadCats(); renderBooks(); }
    function filterBooks() { renderBooks(); }
    
    function renderBooks() {
        const grid = document.getElementById('booksGrid');
        if (!allBooks.length) { grid.innerHTML = '<div class="result">📭 جاري تحميل الكتب...</div>'; return; }
        const search = document.getElementById('search').value.toLowerCase();
        let filtered = allBooks.filter(b => (currentCat === 'الكل' || b.category === currentCat) && b.display.toLowerCase().includes(search));
        document.getElementById('stats').innerHTML = `📊 ${filtered.length} كتاب`;
        let html = '';
        for (let b of filtered) {
            html += `<div class="book-card"><div class="book-cover">📖</div><div class="book-info"><div class="book-title">${escapeHtml(b.display)}</div><div class="book-cat">${b.category}</div><a href="${b.link}" target="_blank" class="download">📥 تحميل</a></div></div>`;
        }
        grid.innerHTML = html || '<div class="result">📭 لا توجد كتب</div>';
    }
    
    // تحميل الأسئلة
    async function loadQuestions() {
        try {
            const res = await fetch(QUESTIONS_URL);
            allQuestions = await res.json();
        } catch(e) {
            console.log("خطأ في تحميل الأسئلة");
        }
    }
    
    function startExam() {
        if (!allQuestions.length) { alert("جاري تحميل الأسئلة..."); return; }
        const shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentExamQuestions = shuffled.slice(0, 10);
        examIdx = 0; examScore = 0;
        document.getElementById('examStart').style.display = 'none';
        document.getElementById('examContent').style.display = 'block';
        document.getElementById('examResult').style.display = 'none';
        renderExam();
    }
    
    function renderExam() {
        const q = currentExamQuestions[examIdx];
        document.getElementById('examQuestion').innerHTML = q.text;
        let html = '';
        q.options.forEach((opt, i) => {
            html += `<button class="option" onclick="selectAnswer(${i})">${opt}</button>`;
        });
        document.getElementById('examOptions').innerHTML = html;
        document.getElementById('examFeedback').innerHTML = '';
        document.getElementById('examNext').style.display = 'none';
        const progress = ((examIdx + 1) / 10) * 100;
        document.getElementById('examProgress').style.width = progress + '%';
    }
    
    function selectAnswer(selected) {
        const q = currentExamQuestions[examIdx];
        if (selected === q.correct) {
            examScore++;
            document.getElementById('examFeedback').innerHTML = '<div class="correct-feedback">✅ إجابة صحيحة!</div>';
        } else {
            document.getElementById('examFeedback').innerHTML = `<div class="wrong-feedback">❌ خطأ! الإجابة الصحيحة: ${q.options[q.correct]}</div>`;
        }
        document.getElementById('examNext').style.display = 'block';
        document.querySelectorAll('.option').forEach(btn => btn.style.opacity = '0.6');
    }
    
    function nextQuestion() {
        if (examIdx < 9) { examIdx++; renderExam(); }
        else { finishExam(); }
    }
    
    function finishExam() {
        document.getElementById('examContent').style.display = 'none';
        let msg = examScore >= 8 ? "🎉 ممتاز! مستوى احترافي" : (examScore >= 6 ? "👍 جيد جداً" : "💪 حاول مرة أخرى");
        document.getElementById('examResult').innerHTML = `<div style="font-size:1.5rem; font-weight:bold;">${examScore}/10</div><p>${msg}</p><button class="btn btn-success" onclick="location.reload()">🔄 اختبار جديد</button>`;
        document.getElementById('examResult').style.display = 'block';
    }
    
    // الحاسبات
    function calcDep() {
        let c = parseFloat(document.getElementById('cost').value);
        let s = parseFloat(document.getElementById('salvage').value);
        let l = parseFloat(document.getElementById('life').value);
        if (isNaN(c) || c <= s) { document.getElementById('depResult').innerHTML = '⚠️ بيانات غير صحيحة'; return; }
        let annual = (c - s) / l;
        document.getElementById('depResult').innerHTML = `📊 الإهلاك السنوي: ${annual.toFixed(2)} ريال`;
    }
    
    function calcBE() {
        let f = parseFloat(document.getElementById('fixedCost').value);
        let p = parseFloat(document.getElementById('price').value);
        let v = parseFloat(document.getElementById('varCost').value);
        if (p <= v) { document.getElementById('beResult').innerHTML = '⚠️ سعر البيع > التكلفة المتغيرة'; return; }
        let units = f / (p - v);
        document.getElementById('beResult').innerHTML = `🎯 نقطة التعادل: ${Math.ceil(units)} وحدة (${(units * p).toFixed(0)} ريال)`;
    }
    
    function calcRatios() {
        let r = parseFloat(document.getElementById('revenue').value);
        let p = parseFloat(document.getElementById('netProfit').value);
        let a = parseFloat(document.getElementById('assets').value);
        let e = parseFloat(document.getElementById('equity').value);
        document.getElementById('ratiosResult').innerHTML = `هامش الربح: ${(p/r*100).toFixed(2)}%<br>ROA: ${(p/a*100).toFixed(2)}%<br>ROE: ${(p/e*100).toFixed(2)}%`;
    }
    
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'library') renderBooks();
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    window.showScreen = showScreen;
    window.setCat = setCat;
    window.filterBooks = filterBooks;
    window.startExam = startExam;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.calcDep = calcDep;
    window.calcBE = calcBE;
    window.calcRatios = calcRatios;
    
    loadBooks();
    loadQuestions();
</script>
</body>
</html>
